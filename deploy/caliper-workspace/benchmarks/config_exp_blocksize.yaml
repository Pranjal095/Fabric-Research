test:
  name: "Tracking Block Size vs Number of Transactions"
  description: "txNumber=5000, Dependency=1.0, pcross=0.10, hotKeys=10, Threads=32"
  workers:
    type: local
    number: 16
  rounds:
    - label: "EXP - 5000 txns"
      description: "5000 transactions"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 500
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 1.0
          hotKeys: 10

observer:
  type: local
  interval: 1

monitor:
  type: docker
  docker:
    containers:
      - all
