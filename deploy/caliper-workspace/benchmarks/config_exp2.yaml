          pcross: 0.10
          dependency: 0.40
          hotKeys: 10

    - label: "EXP2 - Dep 50%"
      description: "50% dependency"
      txNumber: 1000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.50
          hotKeys: 10

observer:
  type: local
  interval: 1

monitor:
  type: docker
  docker:
    containers:
      - all
