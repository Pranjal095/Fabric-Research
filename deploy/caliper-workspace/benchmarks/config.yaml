test:
  name: "Dependency-Aware Execution Mechanism Evaluation"
  description: "Benchmarking the multi-shard Raft dependency tracking endorser cluster"
  workers:
    type: local
    number: 32
  rounds:
    - label: "Pcross 0.00 - No contention"
      description: "0% cross-shard, 10 hot keys"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.00
          hotKeys: 10

    - label: "Pcross 0.25 - Low contention"
      description: "25% cross-shard, 10 hot keys"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.25
          hotKeys: 10

    - label: "Pcross 0.50 - Medium contention"
      description: "50% cross-shard, 10 hot keys"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.50
          hotKeys: 10

    - label: "Pcross 0.75 - High contention"
      description: "75% cross-shard, 10 hot keys"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.75
          hotKeys: 10

    - label: "Pcross 1.00 - Full contention"
      description: "100% cross-shard, 10 hot keys"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 1.00
          hotKeys: 10

observer:
  type: local
  interval: 1

monitor:
  type: docker
  docker:
    containers:
      - all
