test:
  name: "Dependency-Aware Execution Mechanism Evaluation"
  description: "Benchmarking the multi-shard Raft dependency tracking endorser cluster"
  workers:
    type: local
    number: 32
  rounds:
    - label: "EXP 6 - Pcross 0.00"
      description: "0% Cross-Shard Probability"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.00

    - label: "EXP 6 - Pcross 0.25"
      description: "10% Cross-Shard Probability"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.25

    - label: "EXP 6 - Pcross 0.50"
      description: "30% Cross-Shard Probability"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.50

    - label: "EXP 6 - Pcross 0.75"
      description: "50% Cross-Shard Probability"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.75

    - label: "EXP 6 - Pcross 1.00"
      description: "50% Cross-Shard Probability"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 1.00
observer:
  type: local
  interval: 1

monitor:
  type: docker
  docker:
    containers:
      - all
