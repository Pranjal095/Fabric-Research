test:
  name: "EXP1 - Throughput vs Number of Transactions"
  description: "Varying txNumber 1000-5000, Dependency=40%, pcross=0.10, Threads=32"
  workers:
    type: local
    number: 32
  rounds:
    - label: "EXP1 - 1000 txns"
      description: "1000 transactions"
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 100

    - label: "EXP1 - 1500 txns"
      description: "1500 transactions"
      txNumber: 1500
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 100

    - label: "EXP1 - 2000 txns"
      description: "2000 transactions"
      txNumber: 2000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 100

    - label: "EXP1 - 2500 txns"
      description: "2500 transactions"
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 100

    - label: "EXP1 - 3000 txns"
      description: "3000 transactions"
      txNumber: 3000
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 100

observer:
  type: local
  interval: 1

monitor:
  type: docker
  docker:
    containers:
      - all
