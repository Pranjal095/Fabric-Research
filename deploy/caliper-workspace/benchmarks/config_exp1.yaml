test:
  name: "EXP1 - Throughput vs Number of Transactions"
  description: "Varying txNumber 1000-5000, Dependency=40%, pcross=0.10, Threads=32"
  workers:
    type: local
    number: 32
  rounds:
    - label: "EXP1 - 1000 txns"
      description: "1000 transactions"
      txNumber: 1000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 10

    - label: "EXP1 - 2000 txns"
      description: "2000 transactions"
      txNumber: 2000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 10

    - label: "EXP1 - 3000 txns"
      description: "3000 transactions"
      txNumber: 3000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 10

    - label: "EXP1 - 4000 txns"
      description: "4000 transactions"
      txNumber: 4000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 10

    - label: "EXP1 - 5000 txns"
      description: "5000 transactions"
      txNumber: 5000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: workload/cross_shard_load.js
        arguments:
          pcross: 0.10
          dependency: 0.40
          hotKeys: 10

observer:
  type: local
  interval: 1

monitor:
  type: docker
  docker:
    containers:
      - all
