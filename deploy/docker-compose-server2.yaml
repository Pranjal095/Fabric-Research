version: '3.7'
networks:
  fabric_test:
    name: fabric_test
volumes:
  peer3.org1.example.com: null
  peer4.org1.example.com: null
  peer5.org1.example.com: null
  peer6.org1.example.com: null
services:
  couchdb3:
    image: couchdb:3.1.1
    environment:
    - COUCHDB_USER=admin
    - COUCHDB_PASSWORD=adminpw
    ports:
    - 5984:5984
    networks:
    - fabric_test
  peer3.org1.example.com:
    container_name: peer3.org1.example.com
    image: hyperledger/fabric-peer:latest
    environment:
    - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
    - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
    - CORE_PEER_ID=peer3.org1.example.com
    - CORE_PEER_ADDRESS=peer3.org1.example.com:7051
    - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
    - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
    - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051
    - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer3.org1.example.com:7051
    - CORE_PEER_LOCALMSPID=Org1MSP
    - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
    - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb3:5984
    - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
    - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    - EXPERIMENTAL_SHARDING_ENABLED=true
    - CORE_PEER_TLS_ENABLED=true
    - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
    - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
    - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
    volumes:
    - /var/run/docker.sock:/host/var/run/docker.sock
    - peer3.org1.example.com:/var/hyperledger/production
    - ./sharding.json:/opt/gopath/src/github.com/hyperledger/fabric/peer/sharding.json:ro
    - ./crypto-config/peerOrganizations/org1.example.com/peers/peer3.org1.example.com/msp:/etc/hyperledger/fabric/msp
    - ./crypto-config/peerOrganizations/org1.example.com/peers/peer3.org1.example.com/tls:/etc/hyperledger/fabric/tls
    - ../sampleconfig/core.yaml:/etc/hyperledger/fabric/core.yaml:ro
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
    - 7051:7051
    - 7052:7052
    - 27051:27051
    extra_hosts:
    - orderer.example.com:192.168.50.54
    - peer0.org1.example.com:192.168.50.54
    - peer1.org1.example.com:192.168.50.54
    - peer2.org1.example.com:192.168.50.54
    - peer3.org1.example.com:10.96.1.87
    - peer4.org1.example.com:10.96.1.87
    - peer5.org1.example.com:10.96.1.87
    - peer6.org1.example.com:10.96.1.87
    depends_on:
    - couchdb3
    networks:
    - fabric_test
  couchdb4:
    image: couchdb:3.1.1
    environment:
    - COUCHDB_USER=admin
    - COUCHDB_PASSWORD=adminpw
    ports:
    - 6984:5984
    networks:
    - fabric_test
  peer4.org1.example.com:
